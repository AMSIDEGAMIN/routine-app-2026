<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    * {
        font-family: 'Inter', sans-serif;
    }
    
    .alarm-card {
        transition: all 0.3s ease;
    }
    
    .alarm-card:hover {
        transform: translateY(-2px);
    }
    
    .btn-press:active {
        transform: scale(0.97);
    }
    
    @keyframes ring {
        0% { transform: rotate(0deg); }
        10% { transform: rotate(15deg); }
        20% { transform: rotate(-15deg); }
        30% { transform: rotate(15deg); }
        40% { transform: rotate(-15deg); }
        50% { transform: rotate(0deg); }
        100% { transform: rotate(0deg); }
    }
    
    .ringing {
        animation: ring 1s ease-in-out infinite;
        color: #ef4444;
    }
    
    .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    }
    
    .dark .glass {
        background: rgba(30, 41, 59, 0.7);
    }
    
    .gradient-text {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
</style>

<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-6 max-w-2xl">
        <!-- Header -->
        <div class="glass rounded-3xl shadow-xl p-6 mb-6 border border-white/20">
            <div class="flex items-center justify-between mb-2">
                <h1 class="text-3xl md:text-4xl font-bold gradient-text">
                    <i class="fa-solid fa-bell mr-2"></i>Routine &amp; Study Alarm
                </h1>
                <div id="notification-status" class="text-xs px-3 py-1 rounded-full bg-red-100 text-red-700">✗ Notifications Blocked</div>
            </div>
            <div class="text-center mt-4">
                <div id="current-time" class="text-5xl md:text-6xl font-light text-slate-700 tracking-tight">22:15:48</div>
                <div id="current-date" class="text-sm text-slate-500 mt-1">Sunday, June 7, 2026</div>
            </div>
        </div>

        <!-- Manual Alarm Entry -->
        <div class="glass rounded-3xl shadow-lg p-6 mb-6 border border-white/20">
            <h2 class="text-lg font-semibold text-slate-700 mb-4">
                <i class="fa-solid fa-plus-circle mr-2 text-indigo-500"></i>Add Manual Alarm
            </h2>
            <div class="space-y-3">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div>
                        <label class="text-sm font-medium text-slate-600 mb-1 block">Time (HH:MM)</label>
                        <input type="time" id="alarm-time" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-400 focus:border-transparent outline-none transition text-slate-700 bg-white/50" required="">
                    </div>
                    <div>
                        <label class="text-sm font-medium text-slate-600 mb-1 block">Label</label>
                        <input type="text" id="alarm-label" placeholder="e.g. Take a break" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-400 focus:border-transparent outline-none transition text-slate-700 bg-white/50">
                    </div>
                </div>
                <button id="add-alarm-btn" class="w-full bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 text-white font-semibold py-3 rounded-xl shadow-lg hover:shadow-xl transition btn-press">
                    <i class="fa-solid fa-plus mr-2"></i>Add Alarm
                </button>
            </div>
        </div>

        <!-- Templates -->
        <div class="glass rounded-3xl shadow-lg p-6 mb-6 border border-white/20">
            <h2 class="text-lg font-semibold text-slate-700 mb-4">
                <i class="fa-solid fa-layer-group mr-2 text-indigo-500"></i>Load Template
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <button class="template-btn bg-gradient-to-br from-sky-400 to-blue-500 hover:from-sky-500 hover:to-blue-600 text-white font-medium py-4 px-4 rounded-xl shadow-md hover:shadow-lg transition btn-press" data-template="morning">
                    <i class="fa-solid fa-sun block text-2xl mb-1"></i>
                    Morning Routine
                </button>
                <button class="template-btn bg-gradient-to-br from-emerald-400 to-teal-500 hover:from-emerald-500 hover:to-teal-600 text-white font-medium py-4 px-4 rounded-xl shadow-md hover:shadow-lg transition btn-press" data-template="study">
                    <i class="fa-solid fa-book block text-2xl mb-1"></i>
                    Study Session
                </button>
                <button class="template-btn bg-gradient-to-br from-orange-400 to-red-500 hover:from-orange-500 hover:to-red-600 text-white font-medium py-4 px-4 rounded-xl shadow-md hover:shadow-lg transition btn-press" data-template="workout">
                    <i class="fa-solid fa-dumbbell block text-2xl mb-1"></i>
                    Workout
                </button>
            </div>
        </div>

        <!-- Active Alarms -->
        <div class="glass rounded-3xl shadow-lg p-6 mb-6 border border-white/20">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold text-slate-700">
                    <i class="fa-solid fa-clock mr-2 text-indigo-500"></i>Active Alarms
                    <span id="alarm-count" class="ml-2 text-sm bg-indigo-100 text-indigo-600 px-2 py-1 rounded-full">0</span>
                </h2>
                <button id="clear-all-btn" class="text-sm bg-red-500 hover:bg-red-600 text-white font-medium px-4 py-2 rounded-lg transition btn-press">
                    <i class="fa-solid fa-trash mr-1"></i>Clear All
                </button>
            </div>
            <div id="alarms-list" class="space-y-3">
                <div id="empty-state" class="text-center py-12 text-slate-400">
                    <i class="fa-regular fa-bell-slash text-4xl mb-3"></i>
                    <p class="text-sm">No active alarms. Add one above or load a template.</p>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center text-xs text-slate-500 pb-4">
            <p>Alarms saved locally • Keep this tab open for notifications</p>
        </div>
    </div>

    <!-- Alarm Modal -->
    <div id="alarm-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full p-8 text-center transform transition scale-95" id="modal-content">
            <div class="mb-6">
                <i class="fa-solid fa-bell text-6xl text-red-500 ringing"></i>
            </div>
            <h3 class="text-2xl font-bold text-slate-800 mb-2" id="modal-label">Alarm</h3>
            <p class="text-4xl font-light text-slate-600 mb-6" id="modal-time">--:--</p>
            <button id="dismiss-btn" class="w-full bg-gradient-to-r from-red-500 to-orange-500 hover:from-red-600 hover:to-orange-600 text-white font-semibold py-4 rounded-xl shadow-lg hover:shadow-xl transition btn-press">
                <i class="fa-solid fa-stop mr-2"></i>Dismiss
            </button>
        </div>
    </div>

    <script>
        // Templates with preset times and labels
        const TEMPLATES = {
            morning: [
                { time: '06:30', label: 'Wake up & Hydrate' },
                { time: '06:45', label: 'Meditation' },
                { time: '07:00', label: 'Exercise' },
                { time: '07:30', label: 'Shower & Get Ready' },
                { time: '08:00', label: 'Breakfast' },
                { time: '08:30', label: 'Review Daily Goals' }
            ],
            study: [
                { time: '09:00', label: 'Deep Work Session 1' },
                { time: '09:50', label: 'Break - 10 min' },
                { time: '10:00', label: 'Deep Work Session 2' },
                { time: '10:50', label: 'Break - 10 min' },
                { time: '11:00', label: 'Review & Notes' },
                { time: '11:30', label: 'Practice Problems' }
            ],
            workout: [
                { time: '17:00', label: 'Warm Up' },
                { time: '17:10', label: 'Strength Training' },
                { time: '17:40', label: 'Cardio' },
                { time: '18:00', label: 'Cool Down & Stretch' },
                { time: '18:15', label: 'Protein Shake' }
            ]
        };

        let alarms = [];
        let audioContext = null;
        let currentOscillator = null;
        let triggeredToday = new Set();

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadAlarms();
            updateClock();
            setInterval(updateClock, 1000);
            setInterval(checkAlarms, 1000);
            requestNotificationPermission();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('add-alarm-btn').addEventListener('click', addManualAlarm);
            document.getElementById('clear-all-btn').addEventListener('click', clearAllAlarms);
            document.getElementById('dismiss-btn').addEventListener('click', dismissAlarm);
            
            document.querySelectorAll('.template-btn').forEach(btn => {
                btn.addEventListener('click', () => loadTemplate(btn.dataset.template));
            });

            document.getElementById('alarm-label').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addManualAlarm();
            });
        }

        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit',
                hour12: false 
            });
            const dateStr = now.toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            document.getElementById('current-time').textContent = timeStr;
            document.getElementById('current-date').textContent = dateStr;

            // Reset triggered alarms at midnight
            if (now.getHours() === 0 && now.getMinutes() === 0 && now.getSeconds() === 0) {
                triggeredToday.clear();
            }
        }

        function requestNotificationPermission() {
            const statusEl = document.getElementById('notification-status');
            
            if (!('Notification' in window)) {
                statusEl.textContent = 'Notifications not supported';
                statusEl.className = 'text-xs px-3 py-1 rounded-full bg-slate-200 text-slate-600';
                return;
            }

            if (Notification.permission === 'granted') {
                statusEl.textContent = '✓ Notifications On';
                statusEl.className = 'text-xs px-3 py-1 rounded-full bg-emerald-100 text-emerald-700';
            } else if (Notification.permission === 'denied') {
                statusEl.textContent = '✗ Notifications Blocked';
                statusEl.className = 'text-xs px-3 py-1 rounded-full bg-red-100 text-red-700';
            } else {
                statusEl.textContent = 'Enable Notifications';
                statusEl.className = 'text-xs px-3 py-1 rounded-full bg-amber-100 text-amber-700 cursor-pointer';
                statusEl.onclick = () => {
                    Notification.requestPermission().then(permission => {
                        requestNotificationPermission();
                    });
                };
            }
        }

        function addManualAlarm() {
            const timeInput = document.getElementById('alarm-time');
            const labelInput = document.getElementById('alarm-label');
            
            if (!timeInput.value) {
                showToast('Please select a time', 'error');
                return;
            }

            const alarm = {
                id: Date.now(),
                time: timeInput.value,
                label: labelInput.value || 'Alarm',
                enabled: true
            };

            alarms.push(alarm);
            saveAlarms();
            renderAlarms();
            
            timeInput.value = '';
            labelInput.value = '';
            showToast('Alarm added successfully', 'success');
        }

        function loadTemplate(templateName) {
            const template = TEMPLATES[templateName];
            if (!template) return;

            template.forEach(item => {
                alarms.push({
                    id: Date.now() + Math.random(),
                    time: item.time,
                    label: item.label,
                    enabled: true
                });
            });

            saveAlarms();
            renderAlarms();
            showToast(`${templateName.charAt(0).toUpperCase() + templateName.slice(1)} template loaded`, 'success');
        }

        function deleteAlarm(id) {
            alarms = alarms.filter(a => a.id !== id);
            saveAlarms();
            renderAlarms();
            showToast('Alarm deleted', 'info');
        }

        function toggleAlarm(id) {
            const alarm = alarms.find(a => a.id === id);
            if (alarm) {
                alarm.enabled = !alarm.enabled;
                saveAlarms();
                renderAlarms();
            }
        }

        function clearAllAlarms() {
            if (alarms.length === 0) return;
            if (confirm('Delete all alarms?')) {
                alarms = [];
                saveAlarms();
                renderAlarms();
                showToast('All alarms cleared', 'info');
            }
        }

        function renderAlarms() {
            const listEl = document.getElementById('alarms-list');
            const emptyEl = document.getElementById('empty-state');
            const countEl = document.getElementById('alarm-count');
            
            // Sort by time
            alarms.sort((a, b) => a.time.localeCompare(b.time));
            
            countEl.textContent = alarms.filter(a => a.enabled).length;
            
            if (alarms.length === 0) {
                emptyEl.style.display = 'block';
                listEl.innerHTML = '';
                listEl.appendChild(emptyEl);
                return;
            }

            emptyEl.style.display = 'none';
            listEl.innerHTML = '';
            
            alarms.forEach(alarm => {
                const card = document.createElement('div');
                card.className = `alarm-card glass rounded-2xl p-4 border border-white/20 ${!alarm.enabled ? 'opacity-50' : ''}`;
                card.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-4 flex-1">
                            <div class="text-3xl font-light text-slate-700 min-w-[80px]">${alarm.time}</div>
                            <div class="flex-1">
                                <div class="font-medium text-slate-700">${escapeHtml(alarm.label)}</div>
                                <div class="text-xs text-slate-500 mt-1">${getTimeUntil(alarm.time)}</div>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="toggleAlarm(${alarm.id})" class="w-12 h-6 rounded-full transition ${alarm.enabled ? 'bg-indigo-500' : 'bg-slate-300'} relative">
                                <div class="w-5 h-5 bg-white rounded-full absolute top-0.5 transition-transform ${alarm.enabled ? 'translate-x-6' : 'translate-x-0.5'}"></div>
                            </button>
                            <button onclick="deleteAlarm(${alarm.id})" class="text-red-500 hover:text-red-600 p-2 transition">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
                listEl.appendChild(card);
            });
        }

        function getTimeUntil(alarmTime) {
            const now = new Date();
            const [hours, minutes] = alarmTime.split(':').map(Number);
            const alarm = new Date(now);
            alarm.setHours(hours, minutes, 0, 0);
            
            if (alarm <= now) alarm.setDate(alarm.getDate() + 1);
            
            const diff = alarm - now;
            const hrs = Math.floor(diff / 3600000);
            const mins = Math.floor((diff % 3600000) / 60000);
            
            if (hrs > 0) return `in ${hrs}h ${mins}m`;
            if (mins > 0) return `in ${mins}m`;
            return 'now';
        }

        function checkAlarms() {
            const now = new Date();
            const currentTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            const currentSeconds = now.getSeconds();
            
            // Only trigger at 0 seconds to avoid multiple triggers
            if (currentSeconds !== 0) return;
            
            alarms.forEach(alarm => {
                const alarmKey = `${alarm.id}-${now.toDateString()}`;
                if (alarm.enabled && alarm.time === currentTime && !triggeredToday.has(alarmKey)) {
                    triggeredToday.add(alarmKey);
                    triggerAlarm(alarm);
                }
            });
        }

        function triggerAlarm(alarm) {
            // Show notification
            if (Notification.permission === 'granted') {
                new Notification('⏰ Alarm: ' + alarm.label, {
                    body: `Time: ${alarm.time}`,
                    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="80" font-size="80">⏰</text></svg>',
                    tag: 'alarm-' + alarm.id,
                    requireInteraction: true
                });
            }

            // Show modal
            document.getElementById('modal-label').textContent = alarm.label;
            document.getElementById('modal-time').textContent = alarm.time;
            document.getElementById('alarm-modal').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('modal-content').classList.remove('scale-95');
                document.getElementById('modal-content').classList.add('scale-100');
            }, 10);

            // Play sound using Web Audio API
            playAlarmSound();
        }

        function playAlarmSound() {
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                
                // Create repeating beep pattern
                let time = audioContext.currentTime;
                for (let i = 0; i < 5; i++) {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    
                    osc.frequency.value = 800;
                    osc.type = 'sine';
                    
                    gain.gain.setValueAtTime(0, time);
                    gain.gain.linearRampToValueAtTime(0.3, time + 0.01);
                    gain.gain.linearRampToValueAtTime(0, time + 0.2);
                    
                    osc.start(time);
                    osc.stop(time + 0.2);
                    
                    time += 0.3;
                }
            } catch (e) {
                console.error('Audio playback failed:', e);
            }
        }

        function dismissAlarm() {
            document.getElementById('modal-content').classList.remove('scale-100');
            document.getElementById('modal-content').classList.add('scale-95');
            setTimeout(() => {
                document.getElementById('alarm-modal').classList.add('hidden');
            }, 200);
            
            if (currentOscillator) {
                currentOscillator.stop();
                currentOscillator = null;
            }
        }

        function saveAlarms() {
            localStorage.setItem('routineAlarms', JSON.stringify(alarms));
        }

        function loadAlarms() {
            const saved = localStorage.getItem('routineAlarms');
            if (saved) {
                try {
                    alarms = JSON.parse(saved);
                    renderAlarms();
                } catch (e) {
                    console.error('Failed to load alarms:', e);
                    alarms = [];
                }
            }
        }

        function showToast(message, type = 'info') {
            const colors = {
                success: 'bg-emerald-500',
                error: 'bg-red-500',
                info: 'bg-blue-500'
            };
            
            const toast = document.createElement('div');
            toast.className = `fixed bottom-4 left-1/2 -translate-x-1/2 ${colors[type]} text-white px-6 py-3 rounded-xl shadow-lg z-50 transition opacity-0`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.style.opacity = '1', 10);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
